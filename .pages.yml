media:
  - name: images
    label: Fish images
    input: public/fish-images
    output: /fish-images
    rename: safe
    categories: [image]
    extensions: [svg, png, jpg, jpeg, webp]
  - name: noteImages
    label: Note images
    input: public/note-images
    output: /note-images
    rename: safe
    categories: [image]
    extensions: [svg, png, jpg, jpeg, webp]

content:
  - name: site
    label: Site Settings
    type: collection
    path: src/content/site
    filename: site.md
    view:
      fields: [siteName, homepageTitle, tagline]
      primary: siteName
    fields:
      - name: siteName
        label: Site name
        type: string
        description: Shown in the header, footer, and browser title.
      - name: tagline
        label: Short tagline
        type: string
        description: Shown in the footer and browser metadata.
      - name: homepageEyebrow
        label: Homepage eyebrow
        type: string
      - name: homepageTitle
        label: Homepage title
        type: string
      - name: homepageIntro
        label: Homepage intro
        type: text
      - name: careSheetsIntro
        label: Care sheets intro
        type: text
      - name: notesIntro
        label: Notes intro
        type: text
      - name: qrHelperHeading
        label: QR helper heading
        type: string
      - name: qrHelperText
        label: QR helper text
        type: text
      - name: aboutHeading
        label: About section heading
        type: string
      - name: aboutSummary
        label: About summary
        type: text
      - name: experienceText
        label: Experience / background
        type: text
      - name: focusText
        label: Fish focus
        type: text
      - name: credentialsText
        label: Credentials
        type: text
      - name: groupsText
        label: Groups or clubs
        type: text
      - name: contactHeading
        label: Contact section heading
        type: string
      - name: contactText
        label: Contact section text
        type: text
      - name: showContact
        label: Show contact section
        type: boolean
      - name: showCredentials
        label: Show credentials line
        type: boolean
      - name: showGroups
        label: Show group memberships
        type: boolean
  - name: fish
    label: Fish Care Sheets
    type: collection
    path: src/content/fish
    filename: "{slug}.md"
    view:
      fields: [commonName, scientificName, summary]
      primary: commonName
      sort: [commonName]
      search: [commonName, scientificName, summary]
      default:
        sort: commonName
        order: asc
    fields:
      - name: commonName
        label: Common name
        type: string
      - name: scientificName
        label: Scientific name
        type: string
      - name: origin
        label: Origin / native range
        type: text
      - name: temperatureRange
        label: Temperature range
        type: string
      - name: adultSize
        label: Adult size
        type: string
      - name: tankSize
        label: Tank size
        type: string
      - name: foodRecommendation
        label: Food recommendation
        type: string
      - name: difficulty
        label: Difficulty
        type: string
      - name: temperament
        label: Temperament / social note
        type: text
      - name: plantSafe
        label: Plant safe
        type: boolean
      - name: invertebrateSafe
        label: Invertebrate safe
        type: boolean
      - name: juvenileAppearance
        label: Juvenile appearance
        type: text
      - name: adultMaleAppearance
        label: Adult male appearance
        type: text
      - name: adultFemaleAppearance
        label: Adult female appearance
        type: text
      - name: maleFemaleDifferences
        label: Male / female differences
        type: text
      - name: husbandryNotes
        label: Husbandry notes
        type: text
      - name: anthonyNotes
        label: Anthony notes
        type: text
      - name: qrSummary
        label: QR summary
        type: text
      - name: quickWarnings
        label: Quick warnings / take-home notes
        type: string
        list: true
      - name: relatedNoteSlugs
        label: Related note slugs
        type: string
        list: true
        description: Use note slugs such as first-24-hours-with-a-new-fish. A slug is the file name without .md.
      - name: mainImage
        label: Main photo / illustration
        type: image
        description: The primary image used on the fish detail page and card.
        options:
          media: images
          path: public/fish-images
          rename: safe
          extensions: [svg, png, jpg, jpeg, webp]
      - name: juvenileImage
        label: Juvenile photo / illustration
        type: image
        description: Optional image for the juvenile appearance section.
        options:
          media: images
          path: public/fish-images
          rename: safe
          extensions: [svg, png, jpg, jpeg, webp]
      - name: maleImage
        label: Adult male photo / illustration
        type: image
        description: Optional image for the adult male appearance section.
        options:
          media: images
          path: public/fish-images
          rename: safe
          extensions: [svg, png, jpg, jpeg, webp]
      - name: femaleImage
        label: Adult female photo / illustration
        type: image
        description: Optional image for the adult female appearance section.
        options:
          media: images
          path: public/fish-images
          rename: safe
          extensions: [svg, png, jpg, jpeg, webp]
      - name: galleryImages
        label: Additional photos / illustrations
        type: image
        description: Extra images shown lower on the fish detail page.
        options:
          media: images
          path: public/fish-images
          rename: safe
          multiple:
            max: 12
          unique: true
          extensions: [svg, png, jpg, jpeg, webp]
      - name: summary
        label: Short summary
        type: string
      - name: draft
        label: Keep as draft
        type: boolean

  - name: notes
    label: Resources
    type: collection
    path: src/content/notes
    filename: "{slug}.md"
    view:
      fields: [title, category, date]
      primary: title
      sort: [date, title]
      search: [title, summary]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
      - name: category
        label: Category
        type: string
      - name: tags
        label: Tags
        type: string
        list: true
      - name: relatedFishSlugs
        label: Related fish slugs
        type: string
        list: true
        description: Use fish slugs such as blue-betta or zebra-danio. A slug is the file name without .md.
      - name: relatedNoteSlugs
        label: Related note slugs
        type: string
        list: true
        description: Use note slugs such as basic-water-testing. A slug is the file name without .md.
      - name: draft
        label: Keep as draft
        type: boolean
      - name: summary
        label: Short summary
        type: text
      - name: quickAnswer
        label: Quick answer
        type: text
      - name: practicalSteps
        label: Practical steps
        type: string
        list: true
      - name: sources
        label: Sources / references
        type: string
        list: true
      - name: date
        label: Date
        type: date
        options:
          format: yyyy-MM-dd
      - name: lastUpdated
        label: Last Updated
        type: date
        options:
          format: yyyy-MM-dd
      - name: lastReviewed
        label: Last reviewed
        type: date
        options:
          format: yyyy-MM-dd
      - name: visualNote
        label: Visual note
        type: text
      - name: illustrationsDataTechnique
        label: Illustration / diagram note
        type: text
        description: Optional note about diagrams, illustrations, or the visual layout of the article.
      - name: galleryImages
        label: Photos
        type: image
        list: true
        description: Optional note images shown on the article page.
        options:
          media: noteImages
          path: public/note-images
          rename: safe
          extensions: [svg, png, jpg, jpeg, webp]
      - name: body
        label: Body
        type: rich-text
        options:
          media: false
          format: markdown
