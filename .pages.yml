media:
  - name: images
    label: Fish images
    input: public/fish-images
    output: /fish-images
    rename: safe
    categories: [image]
    extensions: [svg, png, jpg, jpeg, webp]
  - name: noteImages
    label: Note images
    input: public/note-images
    output: /note-images
    rename: safe
    categories: [image]
    extensions: [svg, png, jpg, jpeg, webp]

content:
  - name: site
    label: Site Settings
    type: collection
    path: src/content/site
    filename: site.md
    view:
      fields: [siteName, homepageTitle, tagline]
      primary: siteName
    fields:
      - name: siteName
        label: Site name
        type: string
      - name: tagline
        label: Short tagline
        type: string
      - name: homepageEyebrow
        label: Homepage eyebrow
        type: string
      - name: homepageTitle
        label: Homepage title
        type: string
      - name: homepageIntro
        label: Homepage intro
        type: text
      - name: careSheetsIntro
        label: Care sheets intro
        type: text
      - name: notesIntro
        label: Notes intro
        type: text
      - name: qrHelperHeading
        label: QR helper heading
        type: string
      - name: qrHelperText
        label: QR helper text
        type: text
      - name: aboutHeading
        label: About heading
        type: string
      - name: aboutSummary
        label: About summary
        type: text
      - name: experienceText
        label: Experience text
        type: text
      - name: focusText
        label: Focus text
        type: text
      - name: credentialsText
        label: Credentials text
        type: text
      - name: groupsText
        label: Groups text
        type: text
      - name: contactHeading
        label: Contact section heading
        type: string
      - name: contactText
        label: Contact section text
        type: text
      - name: showContact
        label: Show contact section
        type: boolean
      - name: showCredentials
        label: Show credentials
        type: boolean
      - name: showGroups
        label: Show groups
        type: boolean
  - name: fish
    label: Fish Care Sheets
    type: collection
    path: src/content/fish
    filename: "{slug}.md"
    view:
      fields: [commonName, scientificName, summary]
      primary: commonName
      sort: [commonName]
      search: [commonName, scientificName, summary]
      default:
        sort: commonName
        order: asc
    fields:
      - name: commonName
        label: Common Name
        type: string
      - name: scientificName
        label: Scientific Name
        type: string
      - name: origin
        label: Origin
        type: text
      - name: temperatureRange
        label: Temperature Range
        type: string
      - name: adultSize
        label: Adult Size
        type: string
      - name: tankSize
        label: Tank Size
        type: string
      - name: foodRecommendation
        label: Food Recommendation
        type: string
      - name: difficulty
        label: Difficulty
        type: string
      - name: temperament
        label: Temperament
        type: text
      - name: plantSafe
        label: Plant Safe
        type: boolean
      - name: invertebrateSafe
        label: Invertebrate Safe
        type: boolean
      - name: juvenileAppearance
        label: Juvenile Appearance
        type: text
      - name: adultMaleAppearance
        label: Adult Male Appearance
        type: text
      - name: adultFemaleAppearance
        label: Adult Female Appearance
        type: text
      - name: maleFemaleDifferences
        label: Male / Female Differences
        type: text
      - name: husbandryNotes
        label: Husbandry Notes
        type: text
      - name: anthonyNotes
        label: Anthony's Notes
        type: text
      - name: qrSummary
        label: QR quick summary
        type: text
      - name: quickWarnings
        label: Quick warnings / take-home notes
        type: string
        list: true
      - name: relatedNoteSlugs
        label: Related note slugs
        type: string
        list: true
        description: Use note slugs such as first-24-hours-with-a-new-fish.
      - name: mainImage
        label: Main Image
        type: image
        options:
          media: images
          path: public/fish-images
          rename: safe
          extensions: [svg, png, jpg, jpeg, webp]
      - name: juvenileImage
        label: Juvenile Image
        type: image
        options:
          media: images
          path: public/fish-images
          rename: safe
          extensions: [svg, png, jpg, jpeg, webp]
      - name: maleImage
        label: Male Image
        type: image
        options:
          media: images
          path: public/fish-images
          rename: safe
          extensions: [svg, png, jpg, jpeg, webp]
      - name: femaleImage
        label: Female Image
        type: image
        options:
          media: images
          path: public/fish-images
          rename: safe
          extensions: [svg, png, jpg, jpeg, webp]
      - name: galleryImages
        label: Additional Photos
        type: image
        options:
          media: images
          path: public/fish-images
          rename: safe
          multiple:
            max: 12
          unique: true
          extensions: [svg, png, jpg, jpeg, webp]
      - name: summary
        label: Summary
        type: string
      - name: draft
        label: Draft
        type: boolean

  - name: notes
    label: Fishkeeping Notes
    type: collection
    path: src/content/notes
    filename: "{slug}.md"
    view:
      fields: [title, category, date]
      primary: title
      sort: [date, title]
      search: [title, summary]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
      - name: category
        label: Category
        type: string
      - name: tags
        label: Tags
        type: string
        list: true
      - name: relatedFishSlugs
        label: Related fish slugs
        type: string
        list: true
        description: Use fish slugs such as blue-betta or zebra-danio.
      - name: relatedNoteSlugs
        label: Related note slugs
        type: string
        list: true
        description: Use note slugs such as basic-water-testing.
      - name: draft
        label: Draft
        type: boolean
      - name: summary
        label: Summary
        type: text
      - name: quickAnswer
        label: Quick answer
        type: text
      - name: practicalSteps
        label: Practical steps
        type: string
        list: true
      - name: sources
        label: Sources
        type: string
        list: true
      - name: date
        label: Date
        type: date
        options:
          format: yyyy-MM-dd
      - name: lastUpdated
        label: Last Updated
        type: date
        options:
          format: yyyy-MM-dd
      - name: lastReviewed
        label: Last reviewed
        type: date
        options:
          format: yyyy-MM-dd
      - name: visualNote
        label: Visual note
        type: text
      - name: galleryImages
        label: Photos
        type: image
        list: true
        options:
          media: noteImages
          path: public/note-images
          rename: safe
          extensions: [svg, png, jpg, jpeg, webp]
      - name: body
        label: Body
        type: rich-text
        options:
          media: false
          format: markdown
